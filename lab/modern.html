<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa Lab — Modern Survey</title>
    <meta name="description" content="Laboratorio de UI para encuestas Pausa" />
    <style>
      :root {
        --bg: #020617;
        --bg-elevated: rgba(15, 23, 42, 0.98);
        --surface: rgba(15, 23, 42, 0.9);
        --surface-soft: rgba(15, 23, 42, 0.7);
        --fg: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.12);
        --accent-strong: #0ea5e9;
        --error: #fb7185;
        --radius-lg: 18px;
        --radius-pill: 999px;
        --shadow-soft: 0 18px 60px rgba(15, 23, 42, 0.6);
        --border-subtle: rgba(148, 163, 184, 0.18);
        --transition-fast: 160ms ease-out;
        --transition-med: 220ms ease-out;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #0b1120 0, #020617 60%);
        color: var(--fg);
        display: flex;
        justify-content: center;
        align-items: stretch;
        padding: 12px;
      }

      .shell {
        position: relative;
        width: 100%;
        max-width: 440px;
        border-radius: 26px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: radial-gradient(
            circle at top left,
            rgba(56, 189, 248, 0.12),
            transparent 55%
          ),
          var(--bg-elevated);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .tester-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.24);
        background: linear-gradient(
          to right,
          rgba(15, 23, 42, 0.92),
          rgba(15, 23, 42, 0.86)
        );
        backdrop-filter: blur(14px);
      }
      .tester-bar-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tester-chip {
        font-size: 11px;
        color: var(--muted);
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        padding: 3px 9px;
      }
      .tester-bar-right {
        display: flex;
        gap: 4px;
      }
      .pill-btn {
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        padding: 4px 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transition: background var(--transition-fast),
          border-color var(--transition-fast), color var(--transition-fast),
          transform 120ms ease-out;
      }
      .pill-btn span.dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
      }
      .pill-btn[data-active="true"] {
        background: var(--accent-soft);
        border-color: var(--accent-strong);
        color: var(--fg);
      }
      .pill-btn:active {
        transform: translateY(1px) scale(0.98);
      }

      .header {
        padding: 14px 18px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand-mark {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }
      .brand-logo {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        background: radial-gradient(circle at 30% 0, #6ee7b7, transparent 40%),
          radial-gradient(circle at 80% 80%, #38bdf8, transparent 45%),
          radial-gradient(circle at 0 80%, #f97316, transparent 40%);
        border: 1px solid rgba(148, 163, 184, 0.45);
        position: relative;
        overflow: hidden;
      }
      .brand-logo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 0 0,
          rgba(15, 23, 42, 0.25),
          transparent 55%
        );
      }
      .brand-text {
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .brand-sub {
        font-size: 11px;
        color: var(--muted);
      }

      .surface-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 4px 16px 14px;
      }

      .meta-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding-bottom: 6px;
      }
      .meta-survey-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--fg);
      }
      .meta-survey-desc {
        font-size: 11px;
        color: var(--muted);
      }
      .meta-progress-pill {
        font-size: 11px;
        color: var(--muted);
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        padding: 3px 8px;
      }

      .progress-rail {
        position: relative;
        height: 6px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.38);
        overflow: hidden;
      }
      .progress-fill {
        position: absolute;
        inset: 0;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent-strong),
          #a855f7,
          #f97316
        );
        background-size: 180% 100%;
        animation: shimmer 4s linear infinite;
        transform-origin: left center;
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 180% 50%;
        }
      }

      .question-area {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 14px 0 10px;
        overflow: hidden;
      }

      .q-shell {
        position: relative;
        border-radius: var(--radius-lg);
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        padding: 14px 14px 12px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.6);
        transform-origin: center;
        opacity: 0;
        transform: translateY(10px) scale(0.98);
        transition: opacity var(--transition-med), transform var(--transition-med);
      }
      .q-shell[data-active="true"] {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .q-index {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 2px;
      }
      .q-index-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }

      .q-text {
        font-size: 17px;
        line-height: 1.4;
        margin: 4px 0 10px;
      }
      .q-help {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .opt-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .opt-pill {
        position: relative;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(148, 163, 184, 0.38);
        background: rgba(15, 23, 42, 0.7);
        color: var(--fg);
        padding: 10px 14px;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: border-color var(--transition-fast),
          background var(--transition-fast), transform 120ms ease-out,
          box-shadow var(--transition-fast);
      }
      .opt-pill-main {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .opt-pill-badge {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: var(--muted);
      }
      .opt-pill-label {
        font-size: 14px;
      }
      .opt-pill[data-selected="true"] {
        background: linear-gradient(
          120deg,
          rgba(56, 189, 248, 0.18),
          rgba(59, 130, 246, 0.24)
        );
        border-color: var(--accent-strong);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.3);
        transform: translateY(-1px);
      }

      .field-shell {
        background: var(--surface-soft);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 10px 11px 6px;
      }
      .field-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .field-input,
      .field-textarea {
        width: 100%;
        border: none;
        outline: none;
        padding: 4px 0 6px;
        font-size: 15px;
        color: var(--fg);
        background: transparent;
      }
      .field-input::placeholder,
      .field-textarea::placeholder {
        color: rgba(148, 163, 184, 0.8);
      }
      .field-textarea {
        resize: vertical;
        min-height: 80px;
      }

      .footer {
        padding: 10px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .nav-row {
        display: flex;
        gap: 8px;
      }
      .nav-btn {
        flex: 1;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.8);
        color: var(--fg);
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: background var(--transition-fast),
          border-color var(--transition-fast), transform 120ms ease-out,
          box-shadow var(--transition-fast), opacity 100ms;
      }
      .nav-btn.primary {
        background: linear-gradient(135deg, var(--accent-strong), #4f46e5);
        border-color: transparent;
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.45);
      }
      .nav-btn:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: none;
      }
      .nav-btn[disabled] {
        opacity: 0.45;
        cursor: default;
        box-shadow: none;
      }
      .footer-meta {
        font-size: 10px;
        color: var(--muted);
        text-align: center;
      }

      /* THEMES */
      [data-theme="light"] {
        --bg: #f5f3ff;
        --bg-elevated: #f9fafb;
        --surface: rgba(255, 255, 255, 0.95);
        --surface-soft: rgba(249, 250, 251, 0.9);
        --fg: #0f172a;
        --muted: #6b7280;
        --accent: #6366f1;
        --accent-soft: rgba(99, 102, 241, 0.1);
        --accent-strong: #4f46e5;
        --border-subtle: rgba(148, 163, 184, 0.4);
      }
      [data-theme="warm"] {
        --bg: #111827;
        --bg-elevated: rgba(17, 24, 39, 0.98);
        --surface: rgba(17, 24, 39, 0.94);
        --surface-soft: rgba(17, 24, 39, 0.86);
        --fg: #f9fafb;
        --muted: #9ca3af;
        --accent: #f97316;
        --accent-soft: rgba(249, 115, 22, 0.12);
        --accent-strong: #ea580c;
        --border-subtle: rgba(249, 115, 22, 0.35);
      }
      [data-theme="emerald"] {
        --bg: #022c22;
        --bg-elevated: rgba(5, 46, 32, 0.98);
        --surface: rgba(6, 78, 59, 0.95);
        --surface-soft: rgba(6, 78, 59, 0.85);
        --fg: #ecfdf5;
        --muted: #a7f3d0;
        --accent: #34d399;
        --accent-soft: rgba(52, 211, 153, 0.16);
        --accent-strong: #10b981;
        --border-subtle: rgba(110, 231, 183, 0.38);
      }

      @media (max-width: 520px) {
        body {
          padding: 6px;
        }
        .shell {
          border-radius: 0;
          max-width: 480px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell" id="shell" data-theme="dark">
      <div class="tester-bar">
        <div class="tester-bar-left">
          <div class="tester-chip">Lab / UI exploración</div>
        </div>
        <div class="tester-bar-right">
          <button class="pill-btn" data-theme-btn="dark" data-active="true">
            <span class="dot"></span>
            Dark
          </button>
          <button class="pill-btn" data-theme-btn="light">Light</button>
          <button class="pill-btn" data-theme-btn="warm">Warm</button>
          <button class="pill-btn" data-theme-btn="emerald">Emerald</button>
        </div>
      </div>

      <header class="header">
        <div>
          <div class="brand-mark">
            <div class="brand-logo"></div>
            <div class="brand-text">Pausa</div>
          </div>
          <div class="brand-sub">Survey Lab · Exploración visual</div>
        </div>
      </header>

      <main class="surface-main">
        <div class="meta-line">
          <div>
            <div class="meta-survey-title" id="metaTitle">Cargando…</div>
            <div class="meta-survey-desc" id="metaDesc"></div>
          </div>
          <div class="meta-progress-pill" id="metaStep">0 / 0</div>
        </div>
        <div class="progress-rail">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <section class="question-area">
          <div class="q-shell" id="qShell">
            <div class="q-index">
              <span class="q-index-dot"></span>
              <span id="qIndexLabel">Pregunta</span>
            </div>
            <div class="q-text" id="qText">…</div>
            <div class="q-help" id="qHelp"></div>
            <div class="opt-stack" id="options"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="nav-row">
          <button class="nav-btn" id="btnBack">
            ← Atrás
          </button>
          <button class="nav-btn primary" id="btnNext">
            Siguiente →
          </button>
        </div>
        <div class="footer-meta">
          Este es un laboratorio visual. La lógica de envío real sigue usando
          Firebase / Firestore del proyecto Pausa.
        </div>
      </footer>
    </div>

    <script type="module" src="./modern.js"></script>
  </body>
  </html>
